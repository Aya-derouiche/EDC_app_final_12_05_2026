services:
  postgres:
    image: postgres:15-alpine
    container_name: edc_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cloud
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-backend-schema.sql:ro
      - ./gym-management/db/schema.sql:/docker-entrypoint-initdb.d/02-gym-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cloud"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: edc_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edc_backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      PORT: 5000
      DATABASE_HOST: postgres
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: cloud
      DATABASE_PORT: 5432
      JWT_SECRET: dev-secret-change-me
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: edc-documents
      CORS_ORIGIN: http://localhost
    ports:
      - "5000:5000"

  gym-management:
    build:
      context: ./gym-management
      dockerfile: Dockerfile
    container_name: edc_gym_management
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      GYM_PORT: 5002
      GYM_DB_HOST: postgres
      GYM_DB_USER: postgres
      GYM_DB_PASSWORD: postgres
      GYM_DB_NAME: cloud
      GYM_DB_PORT: 5432
      JWT_SECRET: dev-secret-change-me
      CORS_ORIGIN: http://localhost
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: edc-documents
    ports:
      - "5002:5002"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edc_frontend
    restart: always
    depends_on:
      - backend
      - gym-management
    ports:
      - "80:80"

volumes:
  postgres_data:
  minio_data:

