name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  node:
    name: Node checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: EDC_App

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            EDC_App/backend/package-lock.json
            EDC_App/frontend/package-lock.json
            EDC_App/gym-management/package-lock.json

      - name: Install backend dependencies
        run: npm ci --omit=dev
        working-directory: EDC_App/backend

      - name: Install gym-management dependencies
        run: npm ci --omit=dev
        working-directory: EDC_App/gym-management

      - name: Install frontend dependencies
        run: npm ci
        working-directory: EDC_App/frontend

      - name: Build frontend
        run: npm run build
        working-directory: EDC_App/frontend

  docker:
    name: Docker Compose checks
    runs-on: ubuntu-latest
    needs: node
    defaults:
      run:
        working-directory: EDC_App

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Build Docker images
        run: docker compose build backend gym-management frontend

      - name: Start stack
        run: docker compose up -d

      - name: Show running services
        run: docker compose ps

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:5004/api/health; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs backend
          exit 1

      - name: Wait for gym-management
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:5003/health; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs gym-management
          exit 1

      - name: Check frontend
        run: curl -fsS http://localhost

      - name: Check MinIO console
        run: curl -fsS http://localhost:9003

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail 200

      - name: Stop stack
        if: always()
        run: docker compose down -v
